apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: ray-tpu-singlehost-cluster
spec:
  headGroupSpec:
    rayStartParams: {}
    template:
      spec:
        containers:
          - name: ray-head
            image: us-central1-docker.pkg.dev/diesel-patrol-382622/uber-ironwood/uber-ironwood:v9.0
            imagePullPolicy: IfNotPresent
            env:
            - name: RAY_TRAIN_V2_ENABLED
              value: "1"
            ports:
              - containerPort: 8265  # Dashboard
              - containerPort: 10001 # Client
              - containerPort: 8888  # gRPC
            resources:
              limits:
                memory: "48Gi"
              requests:
                cpu: "12"
                memory: "48Gi"
  workerGroupSpecs:
    - replicas: 1
      numOfHosts: 1
      groupName: tpu-group
      rayStartParams: {}
      template:
        spec:
          containers:
            - name: ray-worker
              image: us-central1-docker.pkg.dev/diesel-patrol-382622/uber-ironwood/uber-ironwood:v9.0
              imagePullPolicy: IfNotPresent
              resources:
                limits:
                  memory: "200Gi"
                  google.com/tpu: "4"
                requests:
                  cpu: "48"
                  memory: "200Gi"
                  google.com/tpu: "4"
              env:
                - name: JAX_PLATFORMS
                  value: tpu,cpu
                - name: ENABLE_PJRT_COMPATIBILITY
                  value: "true"
                - name: RAY_TRAIN_V2_ENABLED
                  value: "1"
          nodeSelector:
            cloud.google.com/gke-tpu-accelerator: tpu7x
            cloud.google.com/gke-tpu-topology: 2x2x1
            cloud.google.com/gke-flex-start: "true"
